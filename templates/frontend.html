<!DOCTYPE html>
<html>
<head>
    <title>LLM Security Gateway</title>
</head>
<body>

    <h2>LLM Security Gateway</h2>

    <!-- Input box -->
    <textarea id="inputText" rows="5" cols="50" placeholder="Enter your text here..."></textarea>
    <br><br>

    <!-- Button -->
    <button onclick="sendData()">Check</button>

    <!-- Result display -->
    <h3>Result:</h3>
    <p id="result"></p>

    <script>
        async function sendData() {

            // Step 1: Get input from textbox
            let text = document.getElementById("inputText").value;

            // Step 2: Send request to FastAPI
            let response = await fetch("/check", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ text: text })
            });

            // Step 3: Get response from backend
            let data = await response.json();

            // Step 4: Show result on screen
            document.getElementById("result").innerText =
                "Decision: " + data.decision +
                "\nReason: " + data.reason +
                "\nOutput: " + data.output;
        }
    </script>

</body>
</html>
